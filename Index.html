u003eCoffee Shop\u003c/Text\u003e`\n✅ Distinctive: `\u003cText\u003eThe Hour Before Dawn\u003c/Text\u003e`\n\n---\n\n## COLOR RULES\n\n- Update colors to fit the theme of the user's request. Most of the time, all colors in the template should be updated\n- Ensure sufficient contrast between text/shapes and backgrounds.\n❌ Dark text on dark background\n✅ Adjust fills to maintain readability (e.g., dark bg → light text)\n\n---\n\n## IMAGE REPLACEMENT RULES\n\nOnly fills of type:\"image\" or type:\"video\" become type:\"image-generation\". All other fill types must preserve their type. All image and video must be replaced by an image-generation.\n\n### Caption rules for images\n\n- Describe visual content and style, not semantic context.\n- Avoid text-associated words like \"poster,\" \"flyer,\" \"sale,\" \"banner,\" \"app screen,\" etc.\n- Use descriptive imagery: colors, composition, materials, lighting, artistic style.\n\n### Fill Type Mapping\n\n• type:\"image\" → type:\"image-generation\" (add caption)\n• type:\"video\" → type:\"image-generation\" (add caption)\n• type:\"solid\" or shorthand fill=\"#...\" → remain solid (color change only)\n• type:\"gradient-\\*\" → remain same gradient type (change colors only)\n• No fill → remain without fill\nNever change between fill types or add fills where none existed.\n\n### Correct Examples\n\n✅ Image → image-generation:\nBefore: \u003cEllipse fill={[{type:\"image\", imageRef:\"abc123\"}]} /\u003e\nAfter: \u003cEllipse fill={[{type:\"image-generation\", caption:\"white ceramic cup on light marble surface with soft natural lighting\", imageRef:\"abc123\"}]} /\u003e\n\n✅ Solid → solid (color only):\nBefore: \u003cRectangle fill={[{type:\"solid\", color:\"#F6B\"}]} /\u003e\nAfter: \u003cRectangle fill={[{type:\"solid\", color:\"#4EC\"}]} /\u003e\n\n✅ Gradient → gradient (colors only):\nBefore: \u003cFrame fill={[{type:\"gradient-linear\", gradientStops:[{color:\"#F6B\", position:0},{color:\"#4EC\", position:1}]}]} /\u003e\nAfter: \u003cFrame fill={[{type:\"gradient-linear\", gradientStops:[{color:\"#A7F\", position:0},{color:\"#E49\", position:1}]}]} /\u003e\n\n✅ No fill → keep no fill:\nBefore: \u003cFrame\u003e\u003cText\u003eContent\u003c/Text\u003e\u003c/Frame\u003e\nAfter: \u003cFrame\u003e\u003cText\u003eUpdated Content\u003c/Text\u003e\u003c/Frame\u003e\n\n\n### Incorrect Examples\n\n❌ Never change solid to image-generation\n❌ Never change gradient to image-generation\n❌ Never change shorthand color to structured fill\n❌ Never change solid ↔ gradient\n❌ Never add a fill to a previously transparent frame\n❌ Never add a fill to Logo frames\n❌ Never add text or logo phrases to images\n❌ Forgot to add imageRef to image-generation fill type\nBefore: \u003cEllipse fill={[{type:\"image\", imageRef:\"abc123\"}]} /\u003e\nAfter: \u003cEllipse fill={[{type:\"image-generation\", caption:\"white ceramic cup on light marble surface with soft natural lighting\"}]} /\u003e\n❌ Forgot to replace image\nBefore: \u003cFrame name=\"Fashion Cover\" fill={[{type:\"image\", imageRef:\"abc123\"}]} /\u003e\nAfter: \u003cFrame name=\"Yoga Morning\" fill={[{type:\"image\", imageRef:\"abc123\"}]} /\u003e\n\n---\n\n### Logo Rules\n\nLogo frames are frames whose name is \"Logo\".\n- You MAY update the color of a logo\n- You may never modify the structure of a logo or add an image fill to the logo\n\n❌ Never add an image to a logo frame:\nBefore: \u003cFrame name=\"Logo\"\u003e\u003c/Frame\u003e\nAfter: \u003cFrame name=\"Logo\" fill={[{type:\"image\",...}]} /\u003e\n\n---\n\n## TOP-LEVEL FRAME RULES\n\n- Always change the root Frame's name and fill color.\n- Never modify structural properties (width, height, buzzTemplateType, cornerRadius, hidden).\n\n---\n\n## FINAL DIRECTIVE\n\nEdit guidelines: {{usage}}\n\nNow update this asset to fit the user's edit request: {{userMessage}}","excludedTemplateIds":["f9dca870-3aad-4fec-b4f8-41545ffabfa7","bacfc4c1-aedc-4ee3-a48d-12ee26c35f5a","c608c3f6-b7d6-42bd-84cd-5f207 dna-3"},{"vendor":"qualcomm","architecture":"adreno-6xx"},{"vendor":"arm","architecture":"bifrost"},{"vendor":"microsoft","architecture":"warp"},{"vendor":"intel","architecture":"xe-lpg"},{"vendor":"nvidia","architecture":"kepler"},{"vendor":"nvidia","architecture":""},{"vendor":"amd","architecture":""},{"vendor":"qualcomm","architecture":""},{"vendor":"arm","architecture":"valhall"},{"vendor":"","architecture":""}],"minimum_chromium_version":126,"block_missing_graphics_card_name":true},"group":"default","is_device_based":true,"passed":false,"name":"237339078","rule_id":"default","secondary_exposures":[]},"1515558081":{"id_type":"userID","value":{"ja":false,"es-es":false,"es-la":false,"de":false,"fr":false,"pt-br":false,"ko-kr":false},"group":"3kA93FyOuj2uFcXYwDqk9m","is_device_based":false,"passed":false,"name":"1515558081","rule_id":"3kA93FyOuj2uFcXYwDqk9m","secondary_exposures":[]},"1189863949":{"id_type":"userID","value":{"sample_rate":0},"group":"default","is_device_based":false,"passed":false,"name":"1189863949","rule_id":"default","secondary_exposures":[]},"3678289065":{"id_type":"userID","value":{"config":{"enabled":true,"variant":"default","message":"Developing Admin using React is deprecated in favor of HOT.","linkText":"go/admin-react-deprecation","linkUrl":"https://www.notion.so/figma/Admin-React-Deprecation-293b8b1f837c80ddbbeccc136fe5161e","storageKey":"admin_announcement_banner_react_deprecation"}},"group":"default","is_device_based":false,"passed":false,"name":"3678289065","rule_id":"default","secondary_exposures":[]},"1879927621":{"id_type":"userID","value":{"setupGuidelinesPrompt":"Your job is to examine the project setup and produce a setup guideline document that an AI code-generation agent can later use to correctly configure new projects to use this design system.\n\n## Input\n\n{{SETUP_DIFF}}\n\nThe npm package list and agent constraints have been pre-written to `/guidelines/setup.md`. Read that file to see which packages to analyze.\n\n## IMPORTANT: Output location\nRead the existing `/guidelines/setup.md` file first, then APPEND your findings below the existing content. Do NOT remove or modify the pre-written sections. Do NOT write any other files. Do NOT print the guidelines to chat — write them as a file.\n\n## What to document in `/guidelines/setup.md`\n\n- **Install instructions**: the exact install instructions with all required packages (peer dependencies included).\n- **Required CSS imports**: list every CSS file that must be imported and the recommended import order.\n- **Provider / wrapper components**: if the design system requires a provider component at the app root, document it with all required props and show the recommended entry point pattern.\n- **Build tool configuration**: any required Vite/Webpack/PostCSS/Tailwind configuration.\n- **TypeScript**: any `tsconfig.json` requirements.\n- **Peer dependencies**: list all peer dependencies and their version constraints.\n- **Common gotchas**: things that silently break if misconfigured.\n\n## Process\n\nFor each installed package, find and read the most informative files. Prioritize:\n\n1. **README / CHANGELOG** — setup instructions, provider requirements, and usage examples.\n2. **package.json** — check `peerDependencies`, `exports` (entry points), and `style`/`css` fields (required CSS imports).\n3. **Type definitions** (`.d.ts` files) — provider components, configuration types.\n4. **CSS/SCSS source files** — required CSS imports, theme files.\n\nDo NOT rely on external documentation websites. Everything you need must come from what is shipped in the packages.\n\n## Formatting rules\n\n- Use Markdown for all output.\n- Use fenced code blocks with language tags for all code examples.\n- Keep the document concise but complete — target 100-300 lines.\n- Do not invent information. If a token or prop doesn't exist in the installed packages, omit it.\n- Order content from most-used to least-used.","npm_only":"You are a design-system analyst. Your job is to examine a set of npm packages that make up a design system and produce structured guidelines that an AI code-generation agent can later use to build UIs correctly with that design system.\n\n## Input\n\nThe npm packages that make up the design system are:\n{{PACKAGE_LIST}}\n\n## IMPORTANT: Output location\n\nAll output files MUST be written into the `/guidelines/` directory in the project file system. Use the following paths:\n- `/guidelines/components.md`\n- `/guidelines/icon-discovery.md`\n- `/guidelines/tokens.md`\n- `/guidelines/styles.md`\n- `/guidelines/Guidelines.md` (edit or create)\n\nDo NOT write files anywhere else. Do NOT print the guidelines to chat — write them as files.\n\n## Process\n\n### Step 1 — Locate source material\n\nFor each installed package, find and read the most informative files. Prioritize in this order:\n\n1. **Type definitions** (`.d.ts` files) — the most reliable API surface. Look in `dist/`, `types/`, or the root.\n2. **Barrel exports** (`index.ts`, `index.js`, `index.d.ts`) — reveal what the package publicly exposes.\n3. **README / CHANGELOG** — often contain setup instructions, provider requirements, and usage examples.\n4. **package.json** — check `peerDependencies` (what the host app must provide), `exports` (entry points), and `style`/`css` fields (required CSS imports).\n5. **CSS/SCSS source files** — token definitions, custom property declarations, theme files.\n6. **Source components** (`.tsx`, `.jsx`) — understand prop interfaces, composition patterns, and styling approach.\n7. **Icon packages** — identify which package(s) contain icons (look for `icons` in the package name, or a directory of SVG / React icon components). To analyze icons efficiently:\n   - Check the icon directory size first (e.g. `ls \u003cdir\u003e | wc -l`). Do NOT list the entire directory if it contains more than ~50 files.\n   - Examine a small sample of 5-10 icon files to determine the naming convention (export name pattern, file name pattern, available sizes, common modifiers/suffixes).\n   - Record the icon package import path, the directory location, the naming pattern, and the available sizes.\n   - Do NOT attempt to enumerate every icon — document the pattern instead.\n\nDo NOT rely on external documentation websites. Everything you need must come from what is shipped in the packages.\n\n### Step 2 — Extract and categorize\n\nAnalyze the collected material and produce **four guideline documents** plus an update to the main Guidelines file, described below. Each guideline document must be self-contained: an agent reading only that one document should have enough information to do its job for that category.\n\n## Output: Four guideline documents + Guidelines.md update\n\n### 1. `/guidelines/components.md` — Component usage guidelines\n\nFor each component exported by the design-system packages, document:\n\n- **Import statement**: exact named or default import path.\n- **Props / API surface**: list the meaningful props with their types and allowed values. Focus on props that control visual appearance (variant, size, appearance, intent, etc.), behavioral toggles (disabled, isOpen, isSelected), and composition slots (children, icon, prefix, suffix, asChild).\n- **Variants \u0026 visual options**: enumerate variant names and what they look like semantically (e.g. `variant=\"primary\"` → filled brand-colored button).\n- **Composition patterns**: how components are meant to be combined.\n- **Controlled vs. uncontrolled**: note which components support controlled (value/onChange) vs. uncontrolled (defaultValue) patterns.\n- **Icon usage**: see `icon-discovery.md` for icon naming conventions, import paths, and how to search for icons. Do not list individual icon names in this file.\n- **DO / DON'T examples**: include short JSX snippets showing the correct way to use the component.\n\nGroup components by function: Layout, Navigation, Data Entry, Data Display, Feedback, Overlay.\n\n### 2. `/guidelines/icon-discovery.md` — Icon discovery and usage\n\nDocument everything a code-generation agent needs to find and use icons correctly **without hallucinating icon names**:\n\n- **Icon package**: which npm package(s) provide icons and the exact import path (e.g. `import { Icon24Check } from '@scope/icons'`).\n- **Export naming convention**: the exact pattern for icon export names, derived from the actual files (e.g. `Icon{Size}{PascalCaseName}`). Show 3-5 real examples.\n- **File naming convention**: the corresponding file name pattern (e.g. `icon-{size}-{kebab-name}.tsx`).\n- **Available sizes**: which size prefixes exist (e.g. 16, 24, 32, 48).\n- **Common modifiers / suffixes**: any modifier patterns found in file names (e.g. `-filled`, `-color`, `-large`, `-inverted`).\n- **Icon directory location**: the path to the folder containing icon files within `node_modules/`.\n- **How to find icons at code-generation time** — this is the most critical section. Include it verbatim:\n  - When searching for icons, locate the icon folder and use targeted Glob patterns with keywords (e.g. `*chevron*`, `*bell*`). Before listing or searching any directory, first check the number of entries (e.g. `ls \u003cdir\u003e | wc -l`). If there are more than ~50 files, narrow your search pattern or use `head` to limit results. Never dump hundreds of filenames or Grep results into your context — large tool results persist and bloat every subsequent turn.\n  - Do NOT use Grep to search icon file contents — icon filenames are descriptive, so Glob on filenames is sufficient.\n  - Do NOT list an entire large directory without first checking its size. If you get a result with hundreds of lines, you have made a mistake.\n\n### 3. `/guidelines/tokens.md` — Tokens and CSS guidelines\n\nDocument the design-token and CSS theming system:\n\n- **Token format**: how tokens are consumed in code (CSS custom properties, JS token functions, Tailwind classes, etc.).\n- **Color tokens**: list the semantic color token categories (background, surface, text, border, icon, interaction states) and their naming convention.\n- **Typography tokens**: font family, font size scale, font weight scale, line height scale, and any composite heading/body presets.\n- **Shadow / elevation tokens**: if the system defines shadows or elevation levels.\n- **Border / radius tokens**: border widths, radius scale, and ring/focus styles.\n- **Theming**: how light/dark mode works. What CSS files or providers must be present?\n- **DO / DON'T**: emphasize using semantic tokens over raw hex/rgb values.\n\n### 4. `/guidelines/styles.md` — Style system guidelines (spacing, layout, responsive)\n\nDocument the conventions for spacing, sizing, and layout:\n\n- **Spacing scale**: the spacing system (CSS custom properties, utility classes, or component props). List the scale values.\n- **Layout primitives**: does the design system provide layout components (Stack, Inline, Grid, Flex, Box, Container)? Document their APIs and when to use each.\n- **Spacing conventions**: common spacing patterns (gap between form fields, between sections, padding inside cards, etc.).\n- **Responsive patterns**: breakpoint values and how to apply responsive styles.\n- **CSS methodology**: what styling approach does the system use or expect?\n- **Combining the design system with custom styles**: the right way to style custom elements for consistency.\n- **DO / DON'T**: correct spacing/layout patterns vs. anti-patterns.\n\n### 5. `/guidelines/Guidelines.md` — Main guidelines hub (edit or create)\n\nIf `/guidelines/Guidelines.md` already exists, **edit it** to add the sections described below without removing any existing content. If it does not exist, create it with these sections.\n\n#### a. `## Reading order` section\n\n```\n## Reading order\n\nAlways read first:\n- `Guidelines.md` — this file; the main hub and entry point\n- `setup.md` — required project configuration, providers, and CSS imports\n- `tokens.md` — foundational design tokens (color, typography, spacing)\n\nRead on-demand:\n- `components.md` — read BEFORE using any design-system component\n- `icon-discovery.md` — read BEFORE using any icons\n- `styles.md` — read when building page layouts or applying custom spacing\n```\n\n#### b. `## Companion guideline files` section\n\n| File | Focus |\n|---|---|\n| `components.md` | Component imports, props/API surfaces, variants, composition patterns, and usage examples |\n| `icon-discovery.md` | Icon naming convention, import path, available sizes, and how to search for icons |\n| `tokens.md` | Design tokens, color/typography/shadow/border tokens, theming, and CSS custom properties |\n| `styles.md` | Spacing scales, layout primitives, responsive patterns, and CSS methodology |\n| `setup.md` | Project setup instructions, provider configuration, required CSS imports, and peer dependency requirements |\n\nState that these companion files live alongside `Guidelines.md` in the `/guidelines/` directory and should be consulted for their respective focus areas when building UIs with this design system.\n\n#### c. `### Before using an icon` section\n\n```\n### Before using an icon\n1. Check `icon-discovery.md` for available icons\n2. Do NOT guess icon names — verify the icon exists first\n3. If an icon doesn't exist, pick a different one and verify\n\n## Verifying icons\n\nIMPORTANT: Consult `icon-discovery.md` for how to search for icons and verify they exist. Do NOT guess icon names.\n```\n\n## Formatting rules\n\n- Use Markdown for all output.\n- Use fenced code blocks with language tags for all code examples.\n- Keep each document concise but complete — target 200-500 lines each. Prefer tables for enumerating props/tokens. Prefer short inline JSX snippets over multi-file examples.\n- Do not invent information. If a token or prop doesn't exist in the installed packages, omit it. If you are uncertain about a default value, say \"default not confirmed\" rather than guessing.\n- Icons are especially prone to hallucination. Only document icon patterns you have verified in the actual package files. Do not list individual icon names unless there are fewer than ~30 total icons — instead, document the naming convention and search methodology in `icon-discovery.md`.\n- Within each document, order content from most-used to least-used.","mixed":"You are a design-system analyst. Your job is to examine both npm packages and files extracted from a Figma design library to produce structured guidelines that an AI code-generation agent can later use to build UIs correctly with this design system.\n\n## Input\n\n### npm packages\nThe npm packages that make up part of the design system are:\n{{PACKAGE_LIST}}\n\n### Figma library styles\nThe design system libraries are located in the following folders:\n{{LIBRARY_FOLDERS}}\n\nEach library folder has this structure:\n```\nsrc/\u003clibraryName\u003e/\n  guidelines/\n    guidelines.md   — component names, variants, and usage patterns extracted from Figma\n    styles.css      — all CSS styles extracted from the library (colors, typography, spacing, etc.)\n```\n\n## IMPORTANT: Output location\n\nAll output files MUST be written into the `/guidelines/` directory in the project file system. Use the following paths:\n- `/guidelines/components.md`\n- `/guidelines/icon-discovery.md`\n- `/guidelines/tokens.md`\n- `/guidelines/styles.md`\n- `/guidelines/Guidelines.md` (edit or create)\n\nDo NOT write files anywhere else. Do NOT print the guidelines to chat — write them as files.\n\n## Process\n\n### Step 1 — Locate and examine source material\n\n**For npm packages**, find and read the most informative files. Prioritize in this order:\n\n1. **Type definitions** (`.d.ts` files) — the most reliable API surface. Look in `dist/`, `types/`, or the root.\n2. **Barrel exports** (`index.ts`, `index.js`, `index.d.ts`) — reveal what the package publicly exposes.\n3. **README / CHANGELOG** — often contain setup instructions, provider requireme formation from both sources into a unified view.\n\n## Output: Four guideline documents + Guidelines.md update\n\n### 1. `/guidelines/components.md` — Component usage guidelines\n\nDocument components from npm packages. For each component exported by the design-system packages, document:\n\n- **Import statement**: exact named or default import path.\n- **Props / API surface**: list the meaningful props with their types and allowed values. Focus on props that control visual appearance (variant, size, appearance, intent, etc.), behavioral toggles (disabled, isOpen, isSelected), and composition slots (children, icon, prefix, suffix, asChild).\n- **Variants \u0026 visual options**: enumerate variant names and what they look like semantically (e.g. `variant=\"primary\"` → filled brand-colored button).\n- **Composition patterns**: how components are meant to be combined.\n- **Controlled vs. uncontrolled**: note which components support controlled (value/onChange) vs. uncontrolled (defaultValue) patterns.\n- **Icon usage**: see `icon-discovery.md` for icon naming conventions, import paths, and how to search for icons. Do not list individual icon names in this file.\n- **DO / DON'T examples**: include short JSX snippets showing the correct way to use the component.\n\nGroup components by function: Layout, Navigation, Data Entry, Data Display, Feedback, Overlay.\n\n### 2. `/guidelines/icon-discovery.md` — Icon discovery and usage\n\nDocument everything a code-generation agent needs to find and use icons correctly **without hallucinating icon names**:\n\n- **Icon package**: which npm package(s) provide icons and the exact import path (e.g. `import { Icon24Check } from '@scope/icons'`).\n- **Export naming convention**: the exact pattern for icon export names, derived from the actual files (e.g. `Icon{Size}{PascalCaseName}`). Show 3-5 real examples.\n- **File naming convention**: the corresponding file name pattern (e.g. `icon-{size}-{kebab-name}.tsx`).\n- **Available sizes**: ly, font size scale, font weight scale, line height scale, and any composite heading/body presets or classes.\n- **Spacing scale**: spacing values and their naming pattern from both sources.\n- **Shadow / elevation tokens**: box-shadow definitions and elevation levels.\n- **Border / radius tokens**: border widths, radius scale, and ring/focus styles.\n- **How to use**: show how to reference tokens in application code — both JS/TS imports from npm packages and CSS variable references from library styles.\n- **DO / DON'T**: use semantic tokens over raw values; import the library's `styles.css` when using its variables alongside npm package tokens.\n\n### 4. `/guidelines/styles.md` — Style system guidelines (spacing, layout, patterns)\n\nMerge styling information from **both** npm packages and library files into a single unified document:\n\n**From npm packages:**\n- **Layout primitives**: layout components (Stack, Inline, Grid, Flex, Box, Container) and their APIs.\n- **CSS methodology**: what styling approach the npm design system uses or expects.\n\n**From library `styles.css` and `guidelines.md`:**\n- **Available CSS classes**: utility or component classes found in `styles.css` and what they do.\n- **Component styling patterns**: for components described in `guidelines.md`, document which CSS classes or variables to apply and what variants are available.\n\n**Merged from both sources:**\n- **Spacing conventions**: common spacing patterns and which tokens/variables/classes to use from either source.\n- **Responsive patterns**: breakpoint values and how to apply responsive styles (media queries from CSS, responsive props from npm components).\n- **Combining npm components with library styles**: how to use library CSS classes and variables alongside npm component props. Show examples of applying library tokens to npm components.\n- **DO / DON'T**: correct patterns for using both sources together vs. anti-patterns.\n\n### 5. `/guidelines/Guidelines.md` — Main guidelines hub (edit or create)\n\nIf `/guidelines/Guidelines.md` already exists, **edit it** to add the sections described below without removing any existing content. If it does not exist, create it with these sections.\n\n#### a. `## Reading order` section\n\n```\n## Reading order\n\nAlways read first:\n- `Guidelines.md` — this file; the main hub and entry point\n- `setup.md` — required project configuration, providers, and CSS imports\n- `tokens.md` — foundational design tokens from both npm packages and library styles\n\nRead on-demand:\n- `components.md` — read BEFORE using any npm design-system component\n- `icon-discovery.md` — read BEFORE using any icons\n- `styles.md` — read when building page layouts, applying library styles, or using custom spacing\n```\n\n#### b. `## Companion guideline files` section\n\n| File | Focus |\n|---|---|\n| `components.md` | npm component imports, props/API surfaces, variants, composition patterns, and usage examples |\n| `icon-discovery.md` | Icon naming convention, import path, available sizes, and how to search for icons |\n| `tokens.md` | Design tokens from both npm packages (JS/TS) and library styles (CSS variables) |\n| `styles.md` | CSS classes from library styles, npm layout primitives, spacing conventions, and responsive patterns |\n| `setup.md` | Project setup instructions, provider configuration, required CSS imports, and peer dependency requirements |\n\nState that these companion files live alongside `Guidelines.md` in the `/guidelines/` directory.\n\n#### c. `### Before using an icon` section\n\n```\n### Before using an icon\n1. Check `icon-discovery.md` for available icons\n2. Do NOT guess icon names — verify the icon exists first\n3. If an icon doesn't exist, pick a different one and verify\n\n## Verifying icons\n\nIMPORTANT: Consult `icon-discovery.md` for how to search for icons and verify they exist. Do NOT guess icon names.\n```\n\n#### d. `## Library source files` section\n\nList each library folder and its key files:\n\n{{LIBRARY_FOLDERS}}\n\nFor each library, note:\n- `guidelines/guidelines.md` — component names, variants, and Figma usage patterns\n- `guidelines/styles.css` — extracted CSS styles, variables, and classes\n\n## Formatting rules\n\n- Use Markdown for all output.\n- Use fenced code blocks with language tags for all code examples.\n- Keep each document concise but complete — target 200-500 lines each. Prefer tables for enumerating props/tokens. Prefer short inline JSX snippets over multi-file examples.\n- Do not invent information. If a token or prop doesn't exist in the installed packages or extracted files, omit it. If you are uncertain about a default value, say \"default not confirmed\" rather than guessing.\n- Icons are especially prone to hallucination. Only document icon patterns you have verified in the actual package files. Do not list individual icon names unless there are fewer than ~30 total icons — instead, document the naming convention and search methodology in `icon-discovery.md`.\n- Within each document, order content from most-used to least-used."},"group":"default","is_device_based":false,"passed":false,"name":"1879927621","rule_id":"default","secondary_exposures":[]},"1691618211":{"id_type":"userID","value":{},"group":"default","is_device_based":false,"passed":false,"name":"1691618211","rule_id":"default","secondary_exposures":[]},"458852600":{"id_type":"planKey","value":{"support-share@figma.com":true},"group":"5gsIYp5fNZcyXLGuaXsJGV:100.00:1","is_device_based":false,"passed":true,"name":"458852600","rule_id":"5gsIYp5fNZcyXLGuaXsJGV:100.00:1","secondary_exposures":[]},"3800751224":{"id_type":"userID","value":{"enterprise":{"collaborator":{"code_chat":5,"image_tools":15,"ai_credits":250},"developer":{"code_chat":5,"image_tools":15,"ai_credits":250},"expert":{"code_chat":10000,"image_tools":10000,"text_tools":10000,"ai_credits":10000},"view":{"code_chat":5,"image_tools":0,"ai_credits":250}},"org":{"collaborator":{"code_chat":5,"image_tools":1     <title>Untitled – Figma Make</title>

    <style nonce="" type="text/css">

  /*
    This should be kept in sync with:
    - GRID_TILE_MIN_WIDTH in web/js/browse/shared/views/items_view/grid_view/grid_view.tsx
    - $gridTileMinWidth in _measurements.css
  */
  :root {
    --file-grid-tile-min-width: 272px;
  }

  #filebrowser-loading-page {
    opacity: 1;
    -webkit-transition: opacity .2s ease-in-out;
  }

  .filebrowser-loading-page-layout {
    display: flex;
    flex-wrap: wrap;

    /* Make sure the loading page is flush with the edges of the page so
       our layout isnt affected by browser default margins/paddings */
    position: absolute;
    top: 48px;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: var(--color-bg, var(--fallback-color-bg, white));
  }

  #loading-content-pane {
    opacity: 1;
    -webkit-transition: opacity .4s ease-in-out;
  }

  #filebrowser-loading-page.fadeOut {
    opacity: 0;
  }

  #filebrowser-loading-page.hidden {
    display: none;
    opacity: 0;
  }

  .filebrowser-loading-page .file-grid.create-file-grid {
    margin: 24px 0px;
    grid-gap: 32px;
    background-color: var(--color-bg, white);
  }

  /* HAX: see loading-page-container in loading_spinner.tsx */
  #loading-page-container .create-file-grid {
    display: none;
    background-color: var(--color-bg, white);
  }
  #loading-page-container .sort-dropdown {
    margin-top: 0px;
  }

 /*
  * HAX: The sidebar is cloned and used independently outside of this
  * page so any styles like `.filebrowser-loading-page .thing` applied
  * to sidebar sub-elements also need a selector like
  * `.filebrowser-loading-sidebar .thing` so that they work outside of
  * this page too.
  */
  .filebrowser-loading-page .row,
  .filebrowser-loading-sidebar .row {
    background-color: var(--color-bg-secondary, #f0f0f0);
    border-radius: 3px;
    height: 16px;
  }

  .filebrowser-loading-page .circle,
  .filebrowser-loading-sidebar .circle {
    border-radius: 3px;
    background-color: var(--color-bg-secondary, #f0f0f0);
    width: 16px;
    height: 16px;
  }

  .filebrowser-loading-page .row .circle,
  .filebrowser-loading-sidebar .row .circle {
    position: relative;
    top: -1px;
    left: -35px;
  }

  .filebrowser-loading-sidebar {
    flex: 0 0 240px;
    width: 240px;
    background-color: var(--color-bg, white);
    padding-top: 16px;
    display: flex;
    flex-direction: column;
  }

  .filebrowser-loading-page .navbar {
    height: 48px;
    width: 100%;
    position: fixed;
    top: 0;
    background-color: var(--color-bg-toolbar, #2C2C2C);
    z-index: 1;
  }

  .filebrowser-loading-sidebar .row {
    width: 85px;
    margin-top: 8px;
    margin-bottom: 12px;
    margin-left: 48px;
  }

  .filebrowser-loading-sidebar .row .circle {
    position: relative;
    top: -1px;
    left: -35px;
  }

  .filebrowser-loading-page .divider,
  .filebrowser-loading-sidebar .divider {
    height: 1px;
    background-color: var(--color-border, rgba(0, 0, 0, 0.1));
    margin-top: 8px;
    margin-bottom: 16px;
    margin-left: 16px;
    margin-right: 16px;
  }

  .filebrowser-loading-sidebar .row:nth-child(7) { width: 40px; }
  .filebrowser-loading-sidebar .row:nth-child(8) { width: 58px; }

  .filebrowser-loading-sidebar .row:nth-last-child(1) { opacity: 0.4; width: 65px; }
  .filebrowser-loading-sidebar .row:nth-last-child(2) { opacity: 0.4; width: 65px; }
  .filebrowser-loading-sidebar .row:nth-last-child(3) { opacity: 0.8; width: 46px; }

  .filebrowser-loading-page .page {
    flex: 1 1;
    box-sizing: border-box;
    border-left: 1px var(--color-border, #e5e5e5) solid;
    display: flex;
    flex-direction: column;
  }

  .filebrowser-loading-page .toolbar {
